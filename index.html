<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="theme-toggle">
      <span class="theme-icon">🌙</span>
      <label class="switch" for="theme-switch">
        <input type="checkbox" id="theme-switch" />
        <span class="slider"></span>
      </label>
      <span class="theme-icon">☀️</span>
    </div>

    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div id="gameover-box" class="overlay-box hidden">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <button id="restart-btn" class="menu-btn">Reiniciar</button>
      </div>

      <div id="pause-box" class="overlay-box hidden">
        <p class="overlay-heading">PAUSA</p>
        <button id="resume-btn" class="menu-btn">Reanudar</button>
        <button id="pause-restart-btn" class="menu-btn">Reiniciar</button>
        <button id="controls-btn" class="menu-btn">Ver controles</button>
        <div class="level-select">
          <label for="start-level">Nivel inicial</label>
          <select id="start-level"></select>
        </div>
      </div>

      <div id="controls-view" class="overlay-box hidden">
        <p class="overlay-heading">CONTROLES</p>
        <ul>
          <li><kbd>←</kbd><kbd>→</kbd> mover</li>
          <li><kbd>↑</kbd> rotar</li>
          <li><kbd>↓</kbd> bajar</li>
          <li><kbd>Space</kbd> caída</li>
          <li><kbd>P</kbd> / <kbd>Esc</kbd> pausa</li>
        </ul>
        <button id="controls-back-btn" class="menu-btn">Volver</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
