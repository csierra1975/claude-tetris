<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="theme-toggle">
      <span class="theme-icon">🌙</span>
      <label class="switch" for="theme-switch">
        <input type="checkbox" id="theme-switch" />
        <span class="slider"></span>
      </label>
      <span class="theme-icon">☀️</span>
    </div>

    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section records-section">
          <span class="label">RECORDS</span>
          <table class="highscores-table" id="highscores-table">
            <thead>
              <tr><th>#</th><th>Nombre</th><th>Pts</th><th>Cbo</th><th>Lín</th></tr>
            </thead>
            <tbody id="highscores-body"></tbody>
          </table>
          <div class="records-stats">
            <span>Mejor combo: <strong id="best-combo">0</strong></span>
            <span>Máx. líneas: <strong id="best-lines">0</strong></span>
          </div>
          <button id="reset-highscores-btn" class="reset-btn">Resetear récords</button>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <div id="new-record-form" class="new-record-form hidden">
          <input type="text" id="player-name-input" placeholder="Tu nombre" maxlength="12" autocomplete="off" />
          <button id="save-record-btn">Guardar récord</button>
        </div>
        <table class="highscores-table" id="overlay-highscores-table">
          <thead>
            <tr><th>#</th><th>Nombre</th><th>Puntos</th><th>Combo</th><th>Líneas</th></tr>
          </thead>
          <tbody id="overlay-highscores-body"></tbody>
        </table>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
